{% extends 'base.html' %}
{% block content %}
    <h2>Projects</h2>
    <div class="projects">
        {% for project in projects %}
            <div class="project">
                <h3><a href="{% url 'project_detail' project.id %}">{{ project.title }}</a></h3>
                <img src="{{ project.image.url }}" alt="{{ project.title }}">
                <p>{{ project.description }}</p>
            </div>
        {% endfor %}
    </div>
{% endblock %}
